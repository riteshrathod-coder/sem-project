<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kitchen Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>
    <div id="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="icon" style="width:40px;height:40px;background:linear-gradient(135deg,var(--accent),#fbbf24);border-radius:12px;display:grid;place-items:center;font-size:20px;color:#fff;">🧁</div>
                <span>Kitchen Assistant</span>
            </div>
            <div class="auth-sub">Sign in to your kitchen dashboard</div>

            <div class="auth-mode active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input class="input" id="li-email" placeholder="e.g. admin@gmail.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input class="input" type="password" id="li-pass" placeholder="Enter your password" />
                </div>
                <button class="btn btn-primary" onclick="login()" style="justify-content:center; padding:12px; margin-top:8px;">Sign In</button>
                <div class="auth-toggle">Don't have an account? <a href="register.html" style="color: var(--accent); font-weight: 600; text-decoration: none;">Sign Up</a></div>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        checkAuth(false);
    </script>
</body>
</html>
